<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convergio Control Room</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2/dist/chartjs-plugin-zoom.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="themes.css">
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Convergio Control Room</h1>
    <button class="header-term-btn" onclick="openAllTerminals()" title="Open terminals on all online mesh nodes"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 12l4-4M6 12l4 4"/><line x1="14" y1="16" x2="18" y2="16"/></svg></button>
  </div>
  <div class="header-center">
    <span class="status-dot"></span>
    <span id="clock"></span>
  </div>
  <div class="header-right">
    <div class="refresh-stepper">
      <button class="stepper-btn" onclick="changeRefresh(-1)" title="Decrease interval">&#x25C0;</button>
      <span id="refresh-label">30s</span>
      <button class="stepper-btn" onclick="changeRefresh(1)" title="Increase interval">&#x25B6;</button>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="dashZoom(-1)" title="Zoom out">-</button>
      <span class="zoom-level" id="zoom-level">100%</span>
      <button class="zoom-btn" onclick="dashZoom(1)" title="Zoom in">+</button>
      <button class="zoom-btn zoom-reset" onclick="dashZoom(0)" title="Reset">R</button>
    </div>
    <button class="zoom-btn" onclick="resetWidgetLayout()" title="Reset widget layout"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
    <div class="theme-switcher">
      <button class="theme-btn" id="theme-toggle" onclick="toggleThemeDropdown()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg> Theme</button>
      <div class="theme-dropdown" id="theme-dropdown"></div>
    </div>
  </div>
</div>

<div class="kpi-bar" id="kpi-bar"></div>

<!-- Two-column dashboard layout -->
<div class="dash-columns">
  <div class="dash-col-left">
    <div class="widget" id="mission-panel">
      <div class="widget-header"><span class="widget-title">Active Missions</span></div>
      <div class="widget-body" id="mission-content"><span style="color:var(--text-dim)">Loading...</span></div>
    </div>
    <div class="widget" id="task-pipeline-widget" style="max-height:420px; overflow-y:auto">
      <div class="widget-header">
        <span class="widget-title">Task Pipeline</span>
        <div class="widget-header-legend">
          <span class="legend-item"><span class="dot-done"></span>Done</span>
          <span class="legend-item"><span class="dot-active"></span>Run</span>
          <span class="legend-item"><span class="dot-submitted"></span>Sub</span>
          <span class="legend-item"><span class="dot-blocked"></span>Blk</span>
          <span class="legend-item"><span class="dot-pending"></span>Pnd</span>
          <span class="legend-item"><svg width="10" height="10" viewBox="0 0 24 24" fill="#00cc55" style="vertical-align:-1px"><path d="M12 1L8 5v3H5l-2 4h4l-3 11h2l7-9H9l3-5h5l3-4h-4l1-4h-5z"/></svg>Thor</span>
        </div>
        <div class="widget-actions">
          <span id="task-filter-label" class="task-filter-label"></span>
          <button class="widget-action-btn" id="task-filter-clear" style="display:none" onclick="filterTasks(null)">Show All</button>
        </div>
      </div>
      <div class="widget-body" style="padding:0">
        <table class="task-table" id="task-table">
          <thead><tr><th style="width:70px">ID</th><th>Task</th><th style="width:70px">Status</th><th style="width:80px">Agent</th><th style="width:70px">Tokens</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <div class="widget" id="widget-dist">
      <div class="widget-header"><span class="widget-title">Task Distribution</span></div>
      <div class="widget-body"><div class="chart-container chart-container-sm"><canvas id="dist-chart"></canvas></div></div>
    </div>
  </div>
  <div class="dash-col-right">
    <div class="widget" id="mesh-panel">
      <div class="widget-header">
        <span class="widget-title">Mesh Network</span>
        <div class="widget-header-legend">
          <span class="legend-item"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#00cc55;box-shadow:0 0 4px #00cc55;vertical-align:middle"></span>On</span>
          <span class="legend-item"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#ee3344;vertical-align:middle"></span>Off</span>
          <span class="legend-item"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);vertical-align:middle"></span>Sync</span>
          <span class="legend-item"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--gold);vertical-align:middle"></span>Drift</span>
          <span class="legend-item"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--red);vertical-align:middle"></span>Down</span>
          <button class="mesh-toolbar-btn" onclick="showPeerForm('create')" title="Add Peer">+ Add Peer</button>
          <button class="mesh-toolbar-btn" onclick="showDiscoverOverlay()" title="Discover">🔍 Discover</button>
        </div>
        <div class="widget-actions" id="mesh-actions-bar"></div>
      </div>
      <div class="widget-body mesh-strip" id="mesh-strip"></div>
    </div>
    <div class="widget" id="event-feed-widget">
      <div class="widget-header">◈ EVENT FEED</div>
      <div class="widget-body" id="event-feed-content"></div>
    </div>
    <div class="widget" id="widget-tokens">
      <div class="widget-header">
        <span class="widget-title">Token Burn</span>
        <div class="widget-actions"><button class="widget-action-btn" onclick="resetTokenZoom()" title="Reset zoom"><svg viewBox="0 0 16 16" width="12" height="12"><path d="M1.5 8a6.5 6.5 0 0112.4-2.5M14.5 8a6.5 6.5 0 01-12.4 2.5"/><path d="M13 2.5v3h-3M3 13.5v-3h3"/></svg></button></div>
      </div>
      <div class="widget-body"><div class="chart-container"><canvas id="token-chart"></canvas></div></div>
    </div>
    <div class="widget" id="widget-cost">
      <div class="widget-header"><span class="widget-title">Cost by Model</span></div>
      <div class="widget-body"><div class="chart-container chart-container-sm"><canvas id="model-chart"></canvas></div></div>
    </div>
    <div class="widget" id="history-widget" style="max-height:280px; overflow-y:auto">
      <div class="widget-header"><span class="widget-title">History</span></div>
      <div class="widget-body" id="history-list"></div>
    </div>
  </div>
</div>

<!-- Plan Detail Sidebar -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sb-header">
    <span class="sb-title" id="sb-title">Plan Detail</span>
    <span class="sb-close" onclick="closeSidebar()">&#x2715;</span>
  </div>
  <div class="sb-body" id="sb-body"></div>
</div>

<div class="footer">
  <span>Convergio Control Room v3.0</span>
  <span id="last-update"></span>
</div>

<script>window.onerror=function(m,s,l,c,e){console.error('JS ERROR:',m,s,l,c,e);var d=document.getElementById('js-errors');if(!d){d=document.createElement('div');d.id='js-errors';d.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#1a0000;color:#ff3355;font:11px monospace;padding:8px;z-index:99999;max-height:120px;overflow:auto';document.body.appendChild(d)}d.innerHTML+='<div>'+s.split('/').pop()+':'+l+' '+m+'</div>';}</script>
<script src="theme-switcher.js"></script>
<script src="utils.js"></script>
<script src="formatters.js"></script>
<script src="kpi.js"></script>
<script src="mission.js"></script>
<script src="task-pipeline.js"></script>
<script src="charts.js"></script>
<script src="activity.js"></script>
<script src="kpi-modals.js"></script>
<script src="websocket.js"></script>
<script src="app.js"></script>
<script src="mesh.js"></script>
<script src="mesh-animation.js"></script>
<script src="mesh-actions.js"></script>
<script src="mesh-delegate.js"></script>
<script src="mesh-preflight.js"></script>
<script src="mesh-plan-ops.js"></script>
<script src="peer-crud.js"></script>
<script src="widget-drag.js"></script>
<script src="terminal.js"></script>
</body>
</html>
