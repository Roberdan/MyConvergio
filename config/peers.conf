# Peer Registry Configuration
#
# Format: Flat file registry of available peers (machines/VMs) for distributed work.
# Each peer is defined as a section with key=value pairs. Blank lines separate sections.
#
# Fields:
#   ssh_alias    - SSH config alias or hostname (string, required)
#   user         - SSH username for this peer (string, required)
#   os           - Operating system: macos | linux (string, required)
#   tailscale_ip - Tailscale IP address for private network access (string, e.g., 100.x.x.x)
#   capabilities - Comma-separated list of available agents/tools: claude, copilot, ollama, opencode (string)
#   role         - Peer role: coordinator | worker | hybrid (string, required)
#   status       - Current status: active | inactive (string, default: active)
#
# Valid role definitions:
#   coordinator - Primary control plane, runs planners and validates tasks
#   worker      - Executes tasks, no decision-making
#   hybrid      - Can both coordinate and execute (typical for local machines)
#
# Capabilities reference:
#   claude   - Claude Code integration (local MCP servers)
#   copilot  - Copilot CLI available
#   ollama   - Local LLM via Ollama
#   opencode - OpenCode agent available
#
# Example peer entries follow below.

[my-mac]
ssh_alias=my-mac
user=myuser
os=macos
tailscale_ip=100.100.100.1
capabilities=claude,copilot,ollama
role=hybrid
status=active

[my-linux]
ssh_alias=my-linux
user=ubuntu
os=linux
tailscale_ip=100.100.100.2
capabilities=claude,copilot
role=worker
status=active

[my-cloud]
ssh_alias=my-cloud
user=ubuntu
os=linux
tailscale_ip=100.100.100.3
capabilities=copilot,ollama
role=worker
status=active
