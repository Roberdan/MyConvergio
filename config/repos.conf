# Repo registry for mesh-sync-all.sh
# Project repos to sync on all mesh peers.
# dotclaude (~/.claude) is handled separately via peer-sync.sh (git bundle).
#
# Fields:
#   path       - repo path on peer (~ expanded remotely)
#   branch     - default branch to pull
#   gh_account - GitHub account for `gh auth switch` (HTTPS auth)

[VirtualBPM]
path=~/GitHub/VirtualBPM
branch=main
gh_account=roberdan_microsoft

[MyConvergio]
path=~/GitHub/MyConvergio
branch=master
gh_account=Roberdan
