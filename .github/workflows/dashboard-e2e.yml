name: Dashboard E2E

on:
  pull_request:
    paths:
      - 'scripts/dashboard_web/**'
  push:
    branches: [main, master]
    paths:
      - 'scripts/dashboard_web/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: scripts/dashboard_web
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Create test DB
        run: |
          mkdir -p $HOME/.claude/data $HOME/.claude/config
          sqlite3 $HOME/.claude/data/dashboard.db <<'SQL'
          CREATE TABLE IF NOT EXISTS plans (id INTEGER PRIMARY KEY, name TEXT, status TEXT DEFAULT 'todo', tasks_done INTEGER DEFAULT 0, tasks_total INTEGER DEFAULT 0, human_summary TEXT, execution_host TEXT, parallel_mode TEXT, project_id TEXT, started_at TEXT, completed_at TEXT, lines_added INTEGER DEFAULT 0, lines_removed INTEGER DEFAULT 0, worktree_path TEXT);
          CREATE TABLE IF NOT EXISTS projects (id TEXT PRIMARY KEY, name TEXT, path TEXT);
          CREATE TABLE IF NOT EXISTS waves (id INTEGER PRIMARY KEY AUTOINCREMENT, wave_id TEXT, plan_id INTEGER, name TEXT, status TEXT DEFAULT 'pending', tasks_done INTEGER DEFAULT 0, tasks_total INTEGER DEFAULT 0, position INTEGER DEFAULT 0, branch_name TEXT, pr_number INTEGER, pr_url TEXT, validated_at TEXT);
          CREATE TABLE IF NOT EXISTS tasks (id INTEGER PRIMARY KEY AUTOINCREMENT, task_id TEXT, plan_id INTEGER, wave_id TEXT, wave_id_fk INTEGER, title TEXT, status TEXT DEFAULT 'pending', substatus TEXT, executor_agent TEXT, executor_host TEXT, tokens INTEGER, tokens_total INTEGER DEFAULT 0, cost_usd REAL DEFAULT 0, agent_count INTEGER DEFAULT 0, started_at TEXT, completed_at TEXT, validated_at TEXT, model TEXT, notes TEXT, output_data TEXT);
          CREATE TABLE IF NOT EXISTS token_usage (id INTEGER PRIMARY KEY AUTOINCREMENT, project_id TEXT, plan_id INTEGER, wave_id TEXT, task_id TEXT, agent TEXT, model TEXT, input_tokens INTEGER DEFAULT 0, output_tokens INTEGER DEFAULT 0, cost_usd REAL DEFAULT 0, created_at TEXT DEFAULT (datetime('now')), execution_host TEXT);
          CREATE TABLE IF NOT EXISTS notifications (id INTEGER PRIMARY KEY AUTOINCREMENT, type TEXT, title TEXT, message TEXT, link TEXT, link_type TEXT, is_read INTEGER DEFAULT 0, created_at TEXT DEFAULT (datetime('now')));
          CREATE TABLE IF NOT EXISTS mesh_events (id INTEGER PRIMARY KEY AUTOINCREMENT, event_type TEXT, plan_id INTEGER, source_peer TEXT, payload TEXT, status TEXT DEFAULT 'pending', created_at INTEGER DEFAULT (strftime('%s','now')));
          CREATE TABLE IF NOT EXISTS host_heartbeats (host TEXT PRIMARY KEY, last_seen TEXT, plan_count INTEGER DEFAULT 0, os TEXT);
          CREATE TABLE IF NOT EXISTS peer_heartbeats (peer_name TEXT PRIMARY KEY, last_seen REAL);
          CREATE TABLE IF NOT EXISTS agent_activity (id INTEGER PRIMARY KEY AUTOINCREMENT, agent_id TEXT NOT NULL, task_db_id INTEGER, plan_id INTEGER, agent_type TEXT NOT NULL, model TEXT, description TEXT, status TEXT NOT NULL DEFAULT 'running', tokens_in INTEGER DEFAULT 0, tokens_out INTEGER DEFAULT 0, tokens_total INTEGER DEFAULT 0, cost_usd REAL DEFAULT 0, started_at TEXT NOT NULL DEFAULT (datetime('now')), completed_at TEXT, duration_s REAL, host TEXT, region TEXT, metadata TEXT);
          CREATE INDEX IF NOT EXISTS idx_agent_activity_status ON agent_activity(status);
          CREATE INDEX IF NOT EXISTS idx_agent_activity_plan ON agent_activity(plan_id);
          CREATE INDEX IF NOT EXISTS idx_agent_activity_task ON agent_activity(task_db_id);
          CREATE TABLE IF NOT EXISTS nightly_jobs (id INTEGER PRIMARY KEY AUTOINCREMENT, run_id TEXT, job_name TEXT DEFAULT 'guardian', started_at DATETIME DEFAULT CURRENT_TIMESTAMP, finished_at DATETIME, host TEXT, status TEXT NOT NULL CHECK(status IN ('running','ok','action_required','failed')), sentry_unresolved INTEGER DEFAULT 0, github_open_issues INTEGER DEFAULT 0, processed_items INTEGER DEFAULT 0, fixed_items INTEGER DEFAULT 0, branch_name TEXT, pr_url TEXT, summary TEXT, report_json TEXT);
          CREATE TABLE IF NOT EXISTS nightly_job_definitions (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT NOT NULL UNIQUE, description TEXT, schedule TEXT NOT NULL DEFAULT '0 3 * * *', script_path TEXT NOT NULL, target_host TEXT DEFAULT 'local', enabled INTEGER NOT NULL DEFAULT 1, created_at DATETIME DEFAULT CURRENT_TIMESTAMP);
          SQL

      - name: Run E2E tests
        working-directory: scripts/dashboard_web
        run: npx playwright test --reporter=list

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: scripts/dashboard_web/playwright-report/
          retention-days: 7
