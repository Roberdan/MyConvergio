# Dashboard DB Sync Configuration
# This file contains sensitive host information for database synchronization

# Remote SSH host (alias or user@hostname)
REMOTE_HOST="${REMOTE_HOST:-omarchy-ts}"

# Remote database path
REMOTE_DB="~/.claude/data/dashboard.db"

# Local database path
LOCAL_DB="$HOME/.claude/data/dashboard.db"

# Backup retention (days)
BACKUP_RETENTION_DAYS=7

# Multi-host: map canonical hostnames to SSH aliases
# Used by _resolve_ssh_host() in sync-dashboard-db-ops.sh
MESH_HOST_omarchy="omarchy-ts"
MESH_HOST_m1mario="mac-dev-ts"
MESH_HOST_m3max="localhost"

# Local canonical hostname (overrides hostname -s)
LOCAL_CANONICAL_HOST="m3max"
